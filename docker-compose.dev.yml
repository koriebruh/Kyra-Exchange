# Dev infra. `quarkus dev` also auto-starts Postgres+Redis via Dev Services,
# so this file is for a stable local stack / running the packaged app.
# Observability: `docker compose -f docker-compose.dev.yml --profile obs up`
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kyra
      POSTGRES_USER: kyra
      POSTGRES_PASSWORD: kyra   # dev only — prod creds via SOPS, never here
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyra"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Packaged app. Build jar first: ./mvnw -DskipTests package
  # Run: docker compose -f docker-compose.dev.yml --profile app up --build
  app:
    build:
      context: ./kyra-app
      dockerfile: src/main/docker/Dockerfile.jvm
    profiles: ["app"]
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/kyra
      QUARKUS_DATASOURCE_USERNAME: kyra
      QUARKUS_DATASOURCE_PASSWORD: kyra
      QUARKUS_REDIS_HOSTS: redis://valkey:6379
      QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://lgtm:4317
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Grafana + Loki + Tempo + Prometheus + OTLP in one container (dev only).
  # Prod uses the real stack with Alloy agents (kyra-doc/modules/17).
  lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["obs"]
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  pgdata:
