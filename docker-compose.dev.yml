# Dev infra. `quarkus dev` also auto-starts Postgres+Redis via Dev Services,
# so this file is for a stable local stack / running the packaged app.
# Observability: `docker compose -f docker-compose.dev.yml --profile obs up`
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kyra
      POSTGRES_USER: kyra
      POSTGRES_PASSWORD: kyra   # dev only — prod creds via SOPS, never here
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyra"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local SMTP catcher. The app (dev / app profile) delivers real emails here so
  # verification / withdrawal mails are visible in a web inbox — nothing leaves
  # the machine. SMTP on :1025, inbox UI on http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web inbox
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # Packaged app. Build jar first: ./mvnw -DskipTests package
  # Run: docker compose -f docker-compose.dev.yml --profile app up --build
  app:
    build:
      context: ./kyra-app
      dockerfile: src/main/docker/Dockerfile.jvm
    profiles: ["app"]
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/kyra
      QUARKUS_DATASOURCE_USERNAME: kyra
      QUARKUS_DATASOURCE_PASSWORD: kyra
      QUARKUS_REDIS_HOSTS: redis://valkey:6379
      # Email -> Mailpit (read at http://localhost:8025)
      QUARKUS_MAILER_MOCK: "false"
      QUARKUS_MAILER_HOST: mailpit
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_FROM: no-reply@kyra.exchange
      # Tracing off by default so `--profile app` runs standalone. For traces:
      # also start `--profile obs`, then set QUARKUS_OTEL_SDK_DISABLED=false.
      QUARKUS_OTEL_SDK_DISABLED: "true"
      QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://lgtm:4317
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Local EVM chain for custody dev/test (web3j provider). Deterministic test
  # accounts, instant blocks, fake money — no vendor, no login. JSON-RPC on :8545.
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"

  # OpenBao (open-source Vault fork) — secret store for the wallet seed. Dev mode:
  # in-memory, auto-unsealed, root token "root". DEV ONLY — prod needs a real
  # storage backend + unseal (see kyra-doc/DEV-INFRA.md / TECHDEBT).
  openbao:
    image: openbao/openbao:latest
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    ports:
      - "8200:8200"

  # Grafana + Loki + Tempo + Prometheus + OTLP in one container (dev only).
  # Prod uses the real stack with Alloy agents (kyra-doc/modules/17).
  lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["obs"]
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  pgdata:
