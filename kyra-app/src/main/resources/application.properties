# ===== Kyra Exchange =====
quarkus.application.name=kyra-exchange

# ----- Datasource (dev/test: Quarkus Dev Services auto-start Postgres via Docker) -----
quarkus.datasource.db-kind=postgresql
# prod values via env: QUARKUS_DATASOURCE_JDBC_URL / _USERNAME / _PASSWORD (SOPS-managed)
%dev.quarkus.datasource.devservices.image-name=postgres:16-alpine

# ----- Flyway -----
# Migrations live per module under db/migration/<module>; numbering convention:
# V<module-number*100 + seq>__desc.sql (identity=1xx, account=2xx, ... see kyra-doc)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.schemas=public

# ----- Valkey / Redis (dev/test: Dev Services) -----
# prod: QUARKUS_REDIS_HOSTS

# ----- Observability (kyra-doc/modules/17) -----
# JSON logs in prod; human-readable in dev/test
quarkus.log.console.json.enabled=true
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
quarkus.log.console.json.additional-field."service".value=kyra-exchange

# OpenTelemetry -> Alloy (OTLP gRPC); dev: grafana/otel-lgtm container
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
quarkus.otel.traces.sampler=parentbased_always_on
%test.quarkus.otel.sdk.disabled=true
# Dev has no collector unless you run `--profile obs`; disable by default so
# `quarkus dev` doesn't log OTLP export failures. Turn on to inspect traces:
#   -Dquarkus.otel.sdk.disabled=false  (with the obs stack up on :4317)
%dev.quarkus.otel.sdk.disabled=true

# Micrometer -> Prometheus at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true

# ----- Persistence: Flyway owns the schema; Hibernate never generates it -----
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.schema-management.strategy=none

# ----- JWT (kyra-doc/modules/01): asymmetric, this app verifies with public key -----
# Signing key is used by the identity module to issue access tokens.
# DEV keys in resources/jwt; prod keys come from secrets via env override.
kyra.jwt.issuer=https://kyra.exchange
smallrye.jwt.sign.key.location=jwt/privateKey.pem
mp.jwt.verify.publickey.location=jwt/publicKey.pem
mp.jwt.verify.issuer=https://kyra.exchange

# AES-256 data key for at-rest secret encryption (DEV ONLY; prod via secret/env override)
kyra.crypto.data-key=ZTNXoHa/Ww3uTFSQzXr7nFwxt1WwHSUcvjYcZjNQ/FY=

# ----- OpenAPI docs (public API spec at /q/openapi, Swagger UI in dev) -----
quarkus.smallrye-openapi.info-title=Kyra Exchange API
quarkus.smallrye-openapi.info-version=1.0.0
mp.openapi.extensions.smallrye.info.description=Public REST API for the Kyra Exchange

# ----- Rate limiting (public API, Valkey-backed) -----
kyra.ratelimit.limit=600
kyra.ratelimit.window-seconds=60
# tests aggregate many /v1 calls into one IP bucket — don't trip the limit
%test.kyra.ratelimit.limit=1000000

# ----- Email (kyra-doc/modules/13) -----
# provider: recording = in-memory mock that logs (default, used by all tests);
#           smtp      = real delivery via quarkus-mailer (SmtpEmailSender).
kyra.email.provider=smtp
%test.kyra.email.provider=recording
quarkus.mailer.from=no-reply@kyra.exchange
# Dev: deliver to local Mailpit (docker-compose.dev.yml) instead of the built-in
# mock; open the inbox at http://localhost:8025 to read verification emails.
%dev.quarkus.mailer.mock=false
%dev.quarkus.mailer.host=localhost
%dev.quarkus.mailer.port=1025
# Prod: real relay via env — QUARKUS_MAILER_HOST/_PORT/_USERNAME/_PASSWORD/_TLS,
# QUARKUS_MAILER_MOCK=false. SPF/DKIM/DMARC on the sending domain (see TECHDEBT).

# ----- Custody (kyra-doc/modules/08) -----
# provider: mock  = deterministic in-memory (default, all tests)
#           web3j = self-custody on an EVM chain (HD wallet via web3j, seed in
#                   OpenBao). Local dev chain = Anvil (docker-compose.dev.yml).
# Selected at RUNTIME (CustodyProviderProducer) — set the env below, no rebuild:
#   kyra.custody.web3j.rpc-url=http://localhost:8545      (Anvil dev; prod = node/RPC)
#   kyra.custody.web3j.chain-id=31337
#   kyra.seedstore.openbao.address=http://localhost:8200
#   kyra.seedstore.openbao.token=${OPENBAO_TOKEN}        (dev only: "root")
#   kyra.seedstore.openbao.path=v1/secret/data/kyra/wallet-seed
# An MPC vendor (Fireblocks/BitGo/…) can be added as another provider later.
kyra.custody.provider=mock
%test.kyra.custody.provider=mock

# ----- HTTP -----
quarkus.http.port=8080

# ----- Native image -----
# The f4b6a3 ULID library keeps a monotonic factory holding a SecureRandom in a
# static field; class-initialising it at build time would freeze that RNG's seed
# into the image heap (native-image rejects Random in the heap). Defer the whole
# library to runtime initialisation so the RNG is seeded when the app starts.
quarkus.native.additional-build-args=--initialize-at-run-time=com.github.f4b6a3.ulid

